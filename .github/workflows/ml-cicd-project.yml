name: ML CI/CD

on:
    workflow_dispatch:
    push:
        branches:
            - main
        paths:
            - "ml-cicd-project/**"

jobs:

  train:

    runs-on: ubuntu-latest

    defaults:
        run:
          working-directory: ml-cicd-demo1

    steps:

    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5

      with:
        python-version: 3.11

    - run: pip install -r requirements.txt

    - run: python train.py

    - uses: actions/upload-artifact@v4

      with:
        name: trained-model
        path: model.pkl


  deploy:

    needs: train

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4

    - uses: actions/download-artifact@v4

      with:
        name: trained-model

    - run: docker build -t ml-app .