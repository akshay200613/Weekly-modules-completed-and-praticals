name: MLOPs CI Pipeline

on:
  workflow_dispatch:

  push:
      branches:
          - main
      paths:
        - "mlops-project/**"

  pull_request:
      branches:
          - main
      paths:
        - "mlops-project/**"

jobs:
    build-and-test:

        runs-on: ubuntu-latest

        defaults:
          run:
            working-directory: mlops-project

        steps:

            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                python-version: "3.12"
            - name: Install Dependencies
              run: |
                python -m pip install --upgrade pip
                pip install -r requirements.txt
            - name: Train Model
              run: |
                python train.py

            - name: Run Test
              run: |
                pytest
            
            - name: Build Docker Image
              run: |
                docker build -t mlops-api .

            - name: Upload Model
              uses: actions/upload-artifact@v4
              with:
                name: trained-model
                path: mlops-project/models/model.pkl
              
            - name: Completed
              run: |
                echo "CI/CD Pipeline Executed Sucessfully"