name: ML CI/CD Pipeline1

on:
    push:
        branches:
            - main
        paths: 
            - "ml-cicd-demo1/**"

jobs:
    tain-model:
        runs-on: ubuntu-latest

        defaults:
            run:
              working-directory: ml-cicd-demo1

        steps:

        - name: Checkout Repository
          uses: actions/checkout@v4

        - name: Set up Python
          uses: actions/setup-python@v5
          with:
            python-version: "3.11"

        - name: Install Dependencies
          run: |
            pip install -r requirements.txt

        - name: Train Model
          run: |
            python train.py

        - name: Test Prediction
          run: |
            python predict.py

        - name: Upload Model
          uses: actions/upload-artifact@v4
          with:
            name: trained-model
            path: model/model.pkl