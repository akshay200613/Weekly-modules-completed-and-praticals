name: Automated Retraining Pipeline

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - "automated-retraining/data/new_train.csv"

jobs:
  retrain:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: automated-retraining

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Retraining Pipeline
        run: |
          python retrain.py